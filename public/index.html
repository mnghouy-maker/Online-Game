<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Spin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/casino.css?v=3">
</head>
<body>

  <!-- ============ LOGIN ============ -->
  <div id="login-screen" class="login-screen hidden">
    <div class="card login-card">
      <div class="brand"><span class="coin"></span>GOLDEN SPIN</div>
      <div class="tagline" id="login-tagline">Welcome back. Log in to play.</div>

      <form id="login-form">
        <label for="login-username">Username</label>
        <input id="login-username" autocomplete="username" required>
        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required>
        <button class="btn-gold" type="submit">Log in</button>
        <div class="form-error" id="login-error"></div>
        <div class="switch-row">New here? <button type="button" class="link-btn" id="show-signup">Create an account</button></div>
      </form>

      <form id="signup-form" class="hidden">
        <label for="su-username">Choose a username</label>
        <input id="su-username" autocomplete="username" required placeholder="3-20 letters or numbers">
        <label for="su-name">Your name</label>
        <input id="su-name" placeholder="What we should call you (optional)">
        <label for="su-password">Choose a password</label>
        <input id="su-password" type="password" autocomplete="new-password" required placeholder="At least 6 characters">
        <label for="su-balance">Starting balance you'd like to request</label>
        <input id="su-balance" type="number" min="0" step="1" placeholder="e.g. 500 (we confirm it with you)">
        <button class="btn-gold" type="submit">Sign up</button>
        <div class="form-error" id="signup-error"></div>
        <div class="form-ok hidden" id="signup-ok"></div>
        <div class="switch-row">Already a member? <button type="button" class="link-btn" id="show-login">Log in</button></div>
      </form>
    </div>
  </div>

  <!-- ============ GAME ============ -->
  <div id="game-screen" class="hidden">
    <div class="topbar">
      <div class="brand"><span class="coin"></span>GOLDEN SPIN</div>
      <div class="topbar-right">
        <a class="btn btn-sm" href="/fortune">Fortune God</a>
        <div class="balance-chip">
          <span class="label">Balance</span>
          <span class="value" id="balance">0</span>
        </div>
        <span id="hello" style="color:var(--muted);font-size:13px;"></span>
        <a id="admin-link" class="btn btn-sm hidden" href="/admin">Admin panel</a>
        <button id="logout-btn" class="btn btn-sm">Log out</button>
      </div>
    </div>

    <div class="wrap">
      <div class="game-grid">
        <div class="card machine">
          <h1>LUCKY REELS</h1>
          <div class="reels">
            <div class="reel" id="reel-0"><div class="strip"></div></div>
            <div class="reel" id="reel-1"><div class="strip"></div></div>
            <div class="reel" id="reel-2"><div class="strip"></div></div>
          </div>
          <div class="result-line" id="result-line">&nbsp;</div>
          <div class="bet-row">
            <span class="label">Bet</span>
            <span id="bet-buttons"></span>
          </div>
          <button class="btn-gold spin-btn" id="spin-btn">SPIN</button>
          <div class="ctrl-row">
            <button class="ctrl-btn" id="auto-btn">AUTO: OFF</button>
            <button class="ctrl-btn" id="turbo-btn">TURBO</button>
            <button class="ctrl-btn" id="sound-btn">SOUND</button>
            <button class="ctrl-btn" id="music-btn">MUSIC</button>
          </div>
        </div>

        <div>
          <div class="card paytable" style="margin-bottom:20px;">
            <h2>Paytable</h2>
            <table id="paytable-body"></table>
          </div>
          <div class="card">
            <h2>Recent spins</h2>
            <ul class="history-list" id="history-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/symbols.js?v=1"></script>
  <script src="js/audio.js?v=1"></script>
  <script src="js/slot.js?v=4"></script>
</body>
</html>
