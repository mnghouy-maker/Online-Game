<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortune God — Golden Spin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/casino.css?v=3">
</head>
<body class="fortune-theme">

  <div id="game-screen" class="hidden">
    <div class="topbar">
      <div class="brand"><span class="coin"></span>GOLDEN SPIN</div>
      <div class="topbar-right">
        <a class="btn btn-sm" href="/">Lucky Reels</a>
        <div class="balance-chip">
          <span class="label">Balance</span>
          <span class="value" id="balance">0</span>
        </div>
        <span id="hello" style="color:var(--muted);font-size:13px;"></span>
        <a id="admin-link" class="btn btn-sm hidden" href="/admin">Admin panel</a>
        <button id="logout-btn" class="btn btn-sm">Log out</button>
      </div>
    </div>

    <div class="wrap">
      <div class="game-grid">
        <div class="card machine fortune-machine">
          <h1>FORTUNE GOD</h1>
          <div class="fs-banner hidden" id="fs-banner"></div>
          <div class="fgrid" id="fgrid"></div>
          <div class="result-line" id="result-line">&nbsp;</div>
          <div class="bet-row">
            <span class="label">Bet</span>
            <span id="bet-buttons"></span>
          </div>
          <button class="btn-gold spin-btn" id="spin-btn">SPIN</button>
          <div class="ctrl-row">
            <button class="ctrl-btn" id="auto-btn">AUTO: OFF</button>
            <button class="ctrl-btn" id="turbo-btn">TURBO</button>
            <button class="ctrl-btn" id="sound-btn">SOUND</button>
            <button class="ctrl-btn" id="music-btn">MUSIC</button>
          </div>
        </div>

        <div>
          <div class="card paytable" style="margin-bottom:20px;">
            <h2>Paytable (x bet)</h2>
            <table id="paytable-body"></table>
            <div class="rules-note" id="rules-note"></div>
          </div>
          <div class="card">
            <h2>Recent spins</h2>
            <ul class="history-list" id="history-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/fortune-symbols.js?v=1"></script>
  <script src="js/audio.js?v=1"></script>
  <script src="js/fortune.js?v=3"></script>
</body>
</html>
