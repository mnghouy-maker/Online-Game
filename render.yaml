# Render deployment.
# In Render: New > Blueprint > pick this repo, and it reads this file.
#
# NOTE on the free plan:
#  - The site sleeps after ~15 min of no visitors; the next visit takes
#    up to a minute to wake it.
#  - The database file (accounts + balances) is WIPED whenever the service
#    restarts or redeploys. Fine for trying it out, not for real customers.
#  - For real use, switch to the paid "starter" plan and uncomment the disk
#    section below so balances survive restarts.

services:
  - type: web
    name: golden-spin-casino
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      # Render will ask you to type the admin password when you create
      # the blueprint. Pick something strong — this panel controls balances.
      - key: CASINO_ADMIN_PASSWORD
        sync: false

    # --- for real customers: paid plan + persistent disk ---
    # plan: starter
    # disk:
    #   name: casino-data
    #   mountPath: /data
    #   sizeGB: 1
    # ...and add this under envVars:
    #   - key: CASINO_DATA_DIR
    #     value: /data
